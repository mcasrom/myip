# ==============================================================================
# MyIP - Docker Compose for Hetzner VPS
# ==============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in your API keys
#   2. docker compose up -d
#   3. Access at http://your-hetzner-ip:3000
# ==============================================================================

services:
  myip:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myip-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Security: Limit resources
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    # Security: Read-only filesystem except for temp
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/ip/detect"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - myip-network

networks:
  myip-network:
    driver: bridge
