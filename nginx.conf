# ==============================================================================
# MyIP - Nginx Reverse Proxy Configuration for Hetzner
# ==============================================================================
# Usage:
#   1. Install nginx: sudo apt install nginx
#   2. Install certbot: sudo apt install certbot python3-certbot-nginx
#   3. Copy this file: sudo cp nginx.conf /etc/nginx/sites-available/myip
#   4. Enable: sudo ln -s /etc/nginx/sites-available/myip /etc/nginx/sites-enabled/
#   5. Test: sudo nginx -t
#   6. Get SSL: sudo certbot --nginx -d your-domain.com
#   7. Reload: sudo systemctl reload nginx
# ==============================================================================

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL certificates (auto-generated by certbot)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting (10 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=myip_rate:10m rate=10r/s;
    limit_req zone=myip_rate burst=20 nodelay;

    # Proxy to MyIP Node.js server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long scans
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Block access to sensitive paths
    location ~ /\. {
        deny all;
    }

    # Block direct access to node_modules
    location /node_modules/ {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/myip-access.log;
    error_log /var/log/nginx/myip-error.log;
}
