<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#6366f1" stroke-width="8" stroke-opacity="0.3" stroke-dasharray="10 5" />
  
  <!-- Scanning Radar Arc -->
  <path d="M 256 76 A 180 180 0 0 1 436 256" fill="none" stroke="url(#accentGrad)" stroke-width="12" stroke-linecap="round" />
  
  <!-- Innermost circle -->
  <circle cx="256" cy="256" r="120" fill="#1e1b4b" stroke="#10b981" stroke-width="6" stroke-opacity="0.8" />
  
  <!-- Shield Emblem inside -->
  <path d="M 216 190 L 296 190 L 296 250 C 296 290 256 315 256 315 C 256 315 216 290 216 250 Z" fill="none" stroke="#6366f1" stroke-width="10" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Target Crosshair -->
  <line x1="256" y1="110" x2="256" y2="150" stroke="#10b981" stroke-width="4" />
  <line x1="256" y1="362" x2="256" y2="402" stroke="#10b981" stroke-width="4" />
  <line x1="110" y1="256" x2="150" y2="256" stroke="#10b981" stroke-width="4" />
  <line x1="362" y1="256" x2="402" y2="256" stroke="#10b981" stroke-width="4" />
  
  <!-- Glowing Center Pin -->
  <circle cx="256" cy="256" r="12" fill="#10b981" />
</svg>
